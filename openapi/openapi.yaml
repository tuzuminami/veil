openapi: 3.1.0
info:
  title: VEIL API
  version: 0.2.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
paths:
  /health:
    get:
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
  /ready:
    get:
      responses:
        "200":
          description: Readiness status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
  /v1/policies:
    post:
      summary: Create a draft policy bundle version.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [policyId, bundle]
              properties:
                policyId:
                  type: string
                bundle:
                  $ref: "#/components/schemas/PolicyBundleDraft"
      responses:
        "201":
          description: Draft policy version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyVersionEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/policy-bundles/{policyId}/versions/{version}/validate:
    post:
      summary: Validate a draft policy bundle.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: policyId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResultEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/policies/{policyId}/publish:
    post:
      summary: Publish an immutable policy version.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version:
                  type: string
      responses:
        "200":
          description: Published policy version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyVersionEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/decisions:
    post:
      summary: Evaluate a conversational policy decision.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request]
              properties:
                request:
                  $ref: "#/components/schemas/DecisionRequest"
      responses:
        "201":
          description: Policy decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
  /v1/decisions/{decisionId}:
    get:
      summary: Retrieve decision evidence.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Decision evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/appeals:
    post:
      summary: Create an appeal linked to a prior decision.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request]
              properties:
                request:
                  $ref: "#/components/schemas/AppealRequest"
      responses:
        "201":
          description: Appeal record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppealEnvelope"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
components:
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Stable error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    Meta:
      type: object
      required: [requestId, correlationId, apiVersion]
      properties:
        requestId:
          type: string
        correlationId:
          type: string
        apiVersion:
          type: string
          enum: [v1]
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, correlationId]
          properties:
            code:
              enum: [AUTHENTICATION_REQUIRED, TENANT_SCOPE_DENIED, RESOURCE_NOT_FOUND, VALIDATION_FAILED, DEPENDENCY_UNAVAILABLE]
            message:
              type: string
            details:
              type: array
              items:
                type: string
            correlationId:
              type: string
    HealthEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              enum: [ok, ready]
        meta:
          $ref: "#/components/schemas/Meta"
    PolicyVersionEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PolicyVersion"
        meta:
          $ref: "#/components/schemas/Meta"
    ValidationResultEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [valid, contentHash]
          properties:
            valid:
              type: boolean
            contentHash:
              type: string
        meta:
          $ref: "#/components/schemas/Meta"
    DecisionEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Decision"
        meta:
          $ref: "#/components/schemas/Meta"
    AppealEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Appeal"
        meta:
          $ref: "#/components/schemas/Meta"
    PolicyVersion:
      type: object
      required: [policyId, tenantId, version, status, bundle, contentHash, createdAt, createdBy]
      properties:
        policyId:
          type: string
        tenantId:
          type: string
        version:
          type: string
        status:
          enum: [draft, published]
        bundle:
          $ref: "#/components/schemas/PolicyBundleDraft"
        contentHash:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        publishedAt:
          type: string
          format: date-time
    Decision:
      type: object
      required: [id, tenantId, policyId, version, action, reasonCodes, obligations, inputHash, evidenceHash, correlationId, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        policyId:
          type: string
        version:
          type: string
        action:
          enum: [ALLOW, TRANSFORM, REQUIRE_CONFIRMATION, BLOCK, ESCALATE]
        reasonCodes:
          type: array
          items:
            type: string
        obligations:
          type: array
          items:
            type: string
        matchedRuleId:
          type: string
        inputHash:
          type: string
        evidenceHash:
          type: string
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time
    Appeal:
      type: object
      required: [id, tenantId, decisionId, status, reason, correlationId, createdAt, createdBy]
      properties:
        id:
          type: string
        tenantId:
          type: string
        decisionId:
          type: string
        status:
          enum: [open]
        reason:
          type: string
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
    PolicyBundleDraft:
      type: object
      required: [name, version, defaultAction, rules]
      properties:
        name:
          type: string
        version:
          type: string
        defaultAction:
          enum: [BLOCK, ESCALATE]
        rules:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PolicyRule"
    PolicyRule:
      type: object
      required: [id, priority, effect, match, reasonCode]
      properties:
        id:
          type: string
        priority:
          type: integer
          minimum: 0
        effect:
          enum: [ALLOW, TRANSFORM, REQUIRE_CONFIRMATION, BLOCK, ESCALATE]
        match:
          type: object
          required: [field, operator]
          properties:
            field:
              type: string
            operator:
              enum: [equals, contains, absent]
            value:
              type: string
        reasonCode:
          type: string
        obligations:
          type: array
          items:
            type: string
    DecisionRequest:
      type: object
      required: [policyId, version, input]
      properties:
        policyId:
          type: string
        version:
          type: string
        input:
          type: object
        adapterResult:
          type: object
          properties:
            status:
              enum: [ok, unknown, timeout]
            source:
              type: string
            result:
              enum: [ALLOW, TRANSFORM, REQUIRE_CONFIRMATION, BLOCK, ESCALATE]
    AppealRequest:
      type: object
      required: [decisionId]
      properties:
        decisionId:
          type: string
        reason:
          type: string
