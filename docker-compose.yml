services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veil
      POSTGRES_USER: veil
      POSTGRES_PASSWORD: ${VEIL_POSTGRES_PASSWORD:?set VEIL_POSTGRES_PASSWORD for local development}
    ports:
      - "5432:5432"
    volumes:
      - veil-postgres:/var/lib/postgresql/data

volumes:
  veil-postgres:
