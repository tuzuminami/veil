name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veil_test
          POSTGRES_USER: veil
          POSTGRES_PASSWORD: veil_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veil -d veil_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      VEIL_TEST_DATABASE_URL: postgresql://veil:veil_ci_only@127.0.0.1:5432/veil_test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout RELAY compatibility consumer
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: tuzuminami/relay
          ref: 89b417a653ff468a7ce5ae0d3965370a998ed3a0 # RELAY VEIL audience contract
          path: .compat/relay

      - name: Install RELAY compatibility dependencies
        working-directory: .compat/relay
        run: pnpm install --frozen-lockfile

      - name: Verify VEIL to RELAY enforcement compatibility
        env:
          RELAY_SOURCE_DIR: ${{ github.workspace }}/.compat/relay
        run: pnpm run check:relay-enforcement

      - name: Audit production dependencies
        run: pnpm run audit

      - name: Verify
        run: pnpm run verify

      - name: Validate package contents
        run: pnpm pack --dry-run

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: veil-sbom.cdx.json
          artifact-name: veil-sbom.cdx.json
          syft-version: v1.46.0
          upload-artifact: true
          upload-release-assets: false
