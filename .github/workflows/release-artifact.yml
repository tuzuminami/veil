name: Release Artifact Verification

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-published-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download and install the published release artifact
        env:
          VEIL_RELEASE_TAG: ${{ github.event.release.tag_name }}
          VEIL_RELEASE_ASSETS_JSON: ${{ toJson(github.event.release.assets) }}
        run: pnpm run check:published-release-artifact
